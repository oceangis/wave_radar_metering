scenario: moderate_sea

calm:
  hs: 0.3
  tp: 6.0
  direction: 180.0
  gamma: 3.3

moderate_sea:
  hs: 2.0
  tp: 10.0
  direction: 111.0
  gamma: 3.3

storm:
  hs: 4.0
  tp: 12.0
  direction: 270.0
  gamma: 5.0

mixed_swell:
