    start_after: 120
  dropout:
    enabled: false
    radar: 3
    probability: 0.05
  out_of_range:
    enabled: false
    probability: 0.002

radar:
  array_height: 10.0
  positions:
    R1: [0.0, 0.0]
    R2: [-0.1333, 0.2309]
    R3: [0.1333, 0.2309]
  tilt_angles:
    R1: 0.0
    R2: 10.0
    R3: 10.0
  modbus_address: 246
  baudrate: 115200
