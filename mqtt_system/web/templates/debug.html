<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>数据调试</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; background: #f5f5f5; border-radius: 5px; }
        .log { background: #fff; padding: 10px; margin: 5px 0; border-left: 3px solid #2196F3; }
        .error { border-left-color: #f44336; }
        .success { border-left-color: #4CAF50; }
        .warning { border-left-color: #ff9800; }
        pre { background: #fff; padding: 10px; overflow: auto; max-height: 300px; }
    </style>
</head>
<body>
    <h1>实时数据调试</h1>
    <button onclick="testAPI()">🔄 刷新测试</button>
    <button onclick="clearLogs()">🗑️ 清空日志</button>

    <div class="section">
        <h2>📊 实时日志</h2>
        <div id="logs"></div>
    </div>

    <div class="section">
        <h2>🔍 API Response</h2>
        <pre id="apiResponse">等待数据...</pre>
    </div>

    <div class="section">
        <h2>📈 解析结果</h2>
        <div id="parseResult"></div>
    </div>

    <script>
        const logsDiv = document.getElementById('logs');

        function log(message, type = 'log') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.insertBefore(div, logsDiv.firstChild);
        }

        function clearLogs() {
            logsDiv.innerHTML = '';
        }

        async function testAPI() {
            log('开始测试 /api/latest...', 'log');

            try {
                const response = await fetch('/api/latest');
                log(`HTTP Status: ${response.status}`, response.ok ? 'success' : 'error');

                const text = await response.text();
                log(`Response length: ${text.length} bytes`, 'log');

                document.getElementById('apiResponse').textContent = text;

                // 解析JSON
                let data;
                try {
                    data = JSON.parse(text);
                    log('✓ JSON 解析成功', 'success');
                } catch (e) {
                    log(`✗ JSON 解析失败: ${e.message}`, 'error');
                    return;
                }

                // 检查数据结构
                const resultDiv = document.getElementById('parseResult');
                let html = '';

                html += `<p><strong>data 存在:</strong> ${data !== null && data !== undefined ? '✓ 是' : '✗ 否'}</p>`;
                html += `<p><strong>data.analyzed 存在:</strong> ${data.analyzed !== null && data.analyzed !== undefined ? '✓ 是' : '✗ 否'}</p>`;

                if (data.analyzed) {
                    log('✓ data.analyzed 存在', 'success');

                    html += `<p><strong>analyzed._from_database:</strong> ${data.analyzed._from_database || 'N/A'}</p>`;

                    // 检查 results
                    if (data.analyzed.results) {
                        log('✓ data.analyzed.results 存在', 'success');
                        const r = data.analyzed.results;
                        html += '<h3>Results:</h3>';
                        html += `<p>hm0: ${r.hm0}</p>`;
                        html += `<p>tp: ${r.tp}</p>`;
                        html += `<p>wave_direction: ${r.wave_direction || r.theta}</p>`;
                    } else {
                        log('✗ data.analyzed.results 不存在', 'error');
                    }

                    // 检查 metadata
                    if (data.analyzed.metadata) {
                        log('✓ data.analyzed.metadata 存在', 'success');
                        const m = data.analyzed.metadata;
                        html += '<h3>Metadata:</h3>';
                        html += `<p>end_time: ${m.end_time}</p>`;
                        html += `<p>sample_count: ${m.sample_count}</p>`;
                    } else {
                        log('✗ data.analyzed.metadata 不存在', 'error');
                    }

                    // 测试条件判断
                    html += '<h3>条件测试:</h3>';
                    html += `<p><code>if (data.analyzed)</code>: ${data.analyzed ? '✓ TRUE' : '✗ FALSE'}</p>`;
                    html += `<p><code>Boolean(data.analyzed)</code>: ${Boolean(data.analyzed) ? '✓ TRUE' : '✗ FALSE'}</p>`;
                    html += `<p><code>!!data.analyzed</code>: ${!!data.analyzed ? '✓ TRUE' : '✗ FALSE'}</p>`;

                } else {
                    log('✗ data.analyzed 不存在或为 falsy', 'error');
                    html += '<p style="color: red;">data.analyzed 是 null, undefined, false, 0, 或 空字符串</p>';
                    html += `<p>实际值: ${JSON.stringify(data.analyzed)}</p>`;
                }

                // 检查 raw
                html += `<p><strong>data.raw 存在:</strong> ${data.raw !== null && data.raw !== undefined ? '✓ 是' : '✗ 否'}</p>`;
                if (data.raw) {
                    log('✓ data.raw 存在', 'success');
                } else {
                    log('✗ data.raw 不存在', 'warning');
                }

                // 检查 status
                html += `<p><strong>data.status 存在:</strong> ${data.status !== null && data.status !== undefined ? '✓ 是' : '✗ 否'}</p>`;

                resultDiv.innerHTML = html;

            } catch (error) {
                log(`✗ 错误: ${error.message}`, 'error');
                console.error(error);
            }
        }

        // 页面加载时自动测试
        window.onload = testAPI;

        // 每10秒自动刷新
        setInterval(testAPI, 10000);
    </script>
</body>
</html>
