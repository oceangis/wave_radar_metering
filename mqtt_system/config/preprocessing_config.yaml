# ============================================================================
# 雷达数据预处理配置
# Radar Data Preprocessing Configuration
# ============================================================================
#
# 实现完整的5步标准预处理流程：
# 1. 异常值检测与质量控制 (QC)
# 2. 几何与基准修正 (Geometry Correction)
# 3. 去趋势处理 (Detrending)
# 4. 频带处理 (Filtering)
# 5. 重采样与时间对齐 (Resampling)
#
# 版本: 2.0 (2026-01-12)
# ============================================================================

preprocessing:
  # --------------------------------------------------------------------------
  # 步骤1: 异常值检测与质量控制
  # --------------------------------------------------------------------------
  qc:
    # 范围检查
    valid_range: [0.0, 10.0]  # 有效测距范围（米）

    # 变化率检查
    max_rate_of_change: 1.0  # 最大变化率（m/s）

    # 扁平线检测（设备故障）
    flat_line_count: 3  # 连续相同值数量阈值
    flat_line_tolerance: 0.001  # 判定为"相同"的容差（米）

    # 异常值检测
    outlier_detection:
      method: 'mad'  # 'mad' (推荐) 或 'sigma'
      threshold: 3.5  # MAD阈值（倍数）
      window_size: 60  # 局部检测窗口大小（样本数）

    # 数据插补
    interpolation:
      max_gap_ratio: 0.05  # 最大缺失率（5%）
      method: 'cubic'  # 'linear' 或 'cubic'

    # 三雷达交叉验证
    cross_validation:
      enable: true
      max_deviation: 0.20  # 最大允许偏差（20%）

  # --------------------------------------------------------------------------
  # 步骤2: 几何与基准修正（新增！）
  # --------------------------------------------------------------------------
  geometry_correction:
    enable: true  # 启用几何修正
    use_tilt_angles: true  # 使用 radar.tilt_angles 配置
    platform_motion_compensation: false  # 平台运动补偿（固定平台设为false）

    # 修正方法
    correction_method: 'vertical_projection'  # 垂直投影法

    # 验证选项
    validate_geometry: true  # 启动时验证几何配置
    log_corrections: false  # 记录每次修正（调试用，生产环境关闭）

  # --------------------------------------------------------------------------
  # 步骤3: 去趋势处理
  # --------------------------------------------------------------------------
  detrending:
    enable: true
    method: 'linear'  # 'linear', 'constant', 'highpass'

    # 高通滤波去趋势参数（method='highpass'时使用）
    highpass_cutoff: 0.03  # Hz（去除周期>33秒的成分）
    highpass_order: 4  # 滤波器阶数

  # --------------------------------------------------------------------------
  # 步骤4: 频带处理
  # --------------------------------------------------------------------------
  filtering:
    enable: true
    filter_type: 'bandpass'  # 'bandpass', 'lowpass', 'highpass'
    filter_band: [0.03, 1.0]  # Hz - 扩展频带（建议从[0.04, 0.5]更新）
    filter_order: 4  # Butterworth滤波器阶数

    # 零相位滤波（filtfilt）
    zero_phase: true

    # 能量守恒检查
    check_energy: true
    energy_ratio_range: [0.8, 1.2]  # 允许的能量比范围

  # --------------------------------------------------------------------------
  # 步骤5: 重采样与时间对齐（新增！）
  # --------------------------------------------------------------------------
  resampling:
    enable: true  # 启用重采样

    # 重采样方法
    method: 'cubic'  # 'linear', 'cubic', 'sinc'
    # 说明：
    #   - linear: 最快，适合实时系统
    #   - cubic: 推荐，平衡速度和精度
    #   - sinc: 最精确，但最慢，适合离线分析

    # 时间对齐基准
    time_alignment: 'first_radar'  # 'first_radar', 'earliest', 'mean'
    # 说明：
    #   - first_radar: 以R1时间戳为基准
    #   - earliest: 以最早时间戳为基准
    #   - mean: 以平均时间戳为基准

    # 时间偏差阈值
    max_time_deviation: 0.1  # 秒（超过则报警）

    # 质量验证
    validate_quality: true  # 验证重采样质量（能量守恒、幅值范围）

    # 诊断选项
    compute_deviations: true  # 计算时间偏差统计
    log_deviations: false  # 记录详细偏差（调试用）

  # --------------------------------------------------------------------------
  # 预处理报告
  # --------------------------------------------------------------------------
  reporting:
    enable: true  # 启用预处理报告
    save_intermediate_results: false  # 保存中间步骤结果（调试用）
    generate_plots: false  # 生成可视化图表（生产环境关闭）

    # 报告详细程度
    verbosity: 'summary'  # 'minimal', 'summary', 'detailed'

  # --------------------------------------------------------------------------
  # 性能优化
  # --------------------------------------------------------------------------
  performance:
    parallel_processing: false  # 并行处理（实验性）
    cache_filters: true  # 缓存滤波器系数
    batch_size: 1024  # 批处理大小


# ============================================================================
# 雷达几何配置扩展
# Radar Geometry Configuration (Extended)
# ============================================================================

radar:
  # 安装高度（米）
  array_height: 5.0

  # 雷达倾角（度）
  tilt_angles:
    R1: 0.0   # 垂直安装
    R2: 10.0  # 倾斜10度（需要修正！）
    R3: 10.0  # 倾斜10度（需要修正！）

  # 倾斜方位角（度，正北为0，顺时针）
  # 如果未知，默认为0（假设沿某固定方向倾斜）
  tilt_azimuths:
    R1: 0.0
    R2: 0.0  # 待现场确认
    R3: 0.0  # 待现场确认

  # DIWASP相对位置（米）
  # 注意：如果启用几何修正，这些位置应该是修正后的有效位置
  diwasp_positions:
    R1: [0.0, 0.0, 0.0]
    R2: [-0.1333, 0.2309, 0.0]
    R3: [0.1333, 0.2309, 0.0]

  # 相对位置（兼容旧配置）
  relative_positions:
    1: [0.0, 0.0]
    2: [-0.1333, 0.2309]
    3: [0.1333, 0.2309]

  # GPS绝对位置（度，米）
  positions:
    1: [31.234, 121.456, 5.0]  # [纬度, 经度, 高程]
    2: [31.234, 121.466, 5.0]
    3: [31.244, 121.456, 5.0]


# ============================================================================
# 配置说明和最佳实践
# Configuration Notes and Best Practices
# ============================================================================

notes:
  geometry_correction:
    importance: |
      几何倾角修正是保证测距精度的关键步骤。
      即使倾角只有10°，也会导致1.5%的系统性误差（约4.6cm）。
      对于小波高（Hs<1m）场景，相对误差可达10%。

    validation: |
      启动时应检查：
      1. 倾角是否在合理范围（0-30°）
      2. 三雷达是否形成有效阵列（非共线）
      3. DIWASP位置与relative_positions是否一致

    calibration: |
      建议定期校准：
      1. 测量实际安装倾角（使用倾角仪）
      2. 确认倾斜的三维方位（方位角）
      3. 验证修正后的波高与参考仪器对比

  resampling:
    importance: |
      时间对齐与重采样对于方向谱分析至关重要。
      三雷达并行采集导致的时间戳偏差（最大44ms）会造成：
      - 相位误差：对8s波浪约2°，对4s波浪约4°
      - 方向误差：短周期波可达±10°

    method_selection: |
      - 实时系统：使用 'linear' 或 'cubic'
      - 离线分析：使用 'cubic' 或 'sinc'
      - 高频波（f>0.5Hz）：推荐 'cubic'

    quality_check: |
      重采样后应检查：
      1. 能量守恒（能量比0.9-1.1）
      2. 幅值范围保持（范围比0.8-1.2）
      3. 无过多NaN值（<1%）

  filter_band:
    recommendation: |
      建议使用 [0.03, 1.0] Hz：
      - 下限0.03Hz：涵盖长周期涌浪（T=33s）
      - 上限1.0Hz：涵盖短周期风浪（T=1s）
      - 避免使用原配置[0.04, 0.5]，会丢失部分波浪能量

    safety_margin: |
      上限1.0Hz < Nyquist频率3.0Hz（6Hz采样率），安全系数3倍。

  performance_impact:
    computation_cost: |
      完整5步流程计算开销：
      - 步骤1（异常检测）: ~50ms
      - 步骤2（几何修正）: ~5ms
      - 步骤3（去趋势）: ~20ms
      - 步骤4（滤波）: ~30ms
      - 步骤5（重采样）: ~30ms
      总计: ~135ms（对比原来100ms，增幅+35%）

    real_time_feasibility: |
      分析间隔300秒，处理耗时135ms，占用率0.045%。
      完全满足实时性要求。


