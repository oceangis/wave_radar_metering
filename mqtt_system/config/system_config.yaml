analysis:
  analysis_interval: 60
  assumed_wave_direction: 0.0
  auto_analysis: false
  direction_resolution: 360
  diwasp_method: IMLM
  filter_band:
  - 0.04
  - 1
  filter_enable: true
  gravity: 9.81
  max_abnormal_sampling_ratio: 0.05
  meter_window: 300
  min_samples: 100
  nperseg: 600
  qc:
    flat_line_count: 3
    flat_line_tolerance: 0.001
    max_rate_of_change: 2.5
    valid_range:
    - 0.0
    - 200.0
  tide_window_duration: 300
  warmup_duration: 60
  window_duration: 300
  work_window: 1200
collection:
  buffer_size: 1024
  max_retry: 3
  publish_interval: 1.0
  radar_retry_interval: 30
  retry_delay: 0.1
  sample_rate: 6
database:
  connection_pool:
    max: 10
    min: 2
  database: wave_monitoring
  host: localhost
  password: wave2025
  port: 5432
  user: wave_user
ec800:
  baudrate: 115200
  port: /dev/ttyAMA0
logging:
  backup_count: 5
  console_logging: true
  file_logging: true
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
  log_dir: /home/pi/radar/mqtt_system/logs
  max_bytes: 10485760
